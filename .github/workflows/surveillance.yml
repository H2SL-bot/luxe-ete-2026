name: Surveillance du radar

# Filet de DERNIER RECOURS, indépendant de tout le reste.
#
# La mise à jour quotidienne du site est faite par une routine Claude qui tourne
# dans le cloud. Si cette routine s'arrête — panne, limite d'usage, changement de
# réglage — plus personne ne met le site à jour, et RIEN ne le signale : le site
# reste en ligne, simplement figé. C'est le pire des cas, parce qu'il est
# invisible.
#
# Ce workflow tourne chez GitHub, sans machine, sans Claude, sans clé d'API. Il
# regarde une seule chose : la date affichée en haut du site. Si elle a plus de
# deux jours, il ouvre une issue — GitHub envoie alors un mail au propriétaire.
#
# Deux jours de tolérance : une passe manquée arrive (limite d'usage, incident
# réseau) et se rattrape toute seule le lendemain. Trois jours, non : c'est une
# vraie panne.

on:
  schedule:
    # L'ordonnanceur de GitHub est souvent en retard de plusieurs heures. On pose
    # deux créneaux dans la journée : le premier qui part fait le contrôle,
    # le second ne coûte rien s'il est déjà bon.
    - cron: "23 9 * * *" # ~11h23 Paris l'été
    - cron: "23 16 * * *" # ~18h23 Paris l'été
  workflow_dispatch: {} # + lancement manuel depuis l'onglet Actions

permissions:
  contents: read
  issues: write

concurrency:
  group: surveillance-radar
  cancel-in-progress: false

jobs:
  controler:
    runs-on: ubuntu-latest
    steps:
      - name: Le site affiche-t-il une date fraîche ?
        id: controle
        run: |
          set -uo pipefail
          MOIS=(x janvier février mars avril mai juin juillet août septembre octobre novembre décembre)
          fr_date() { # $1 = décalage en jours
            local d m y
            d=$(TZ=Europe/Paris date -d "-$1 days" +%-d)
            m=$(TZ=Europe/Paris date -d "-$1 days" +%-m)
            y=$(TZ=Europe/Paris date -d "-$1 days" +%Y)
            echo "$d ${MOIS[$m]} $y"
          }

          PAGE=$(curl -s --max-time 30 -A "surveillance-radar" https://constanceparis7.com/ || true)
          if [ -z "$PAGE" ]; then
            echo "resultat=injoignable" >> "$GITHUB_OUTPUT"
            echo "detail=Le site n'a pas répondu." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Tolérance : aujourd'hui, hier ou avant-hier.
          for J in 0 1 2; do
            if printf '%s' "$PAGE" | grep -qF "$(fr_date $J)"; then
              echo "Date trouvée : $(fr_date $J) (il y a $J jour(s)) — le radar tourne."
              echo "resultat=ok" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          VUE=$(printf '%s' "$PAGE" | grep -o "vérifiées le [^<]*" | head -1)
          echo "resultat=fige" >> "$GITHUB_OUTPUT"
          echo "detail=Date affichée : ${VUE:-introuvable}. Attendu : $(fr_date 0), $(fr_date 1) ou $(fr_date 2)." >> "$GITHUB_OUTPUT"

      - name: Alerter si le radar est figé
        if: steps.controle.outputs.resultat != 'ok'
        uses: actions/github-script@v7
        env:
          RESULTAT: ${{ steps.controle.outputs.resultat }}
          DETAIL: ${{ steps.controle.outputs.detail }}
        with:
          script: |
            const titre = "⚠️ Le radar ne se met plus à jour";
            // Une seule issue ouverte à la fois : on commente au lieu d'en créer
            // une nouvelle chaque jour, sinon l'alerte devient du bruit.
            const ouvertes = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "surveillance",
            });
            const corps = [
              process.env.RESULTAT === "injoignable"
                ? "Le site n'a pas répondu."
                : "Le site répond, mais la date affichée n'a pas bougé depuis plus de deux jours.",
              "",
              process.env.DETAIL,
              "",
              "Ce que ça veut dire : la routine quotidienne ne publie plus.",
              "À vérifier sur https://claude.ai/code/routines (la routine `radar-luxe`).",
              "",
              `Contrôle du ${new Date().toISOString()}.`,
            ].join("\n");
            if (ouvertes.data.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: ouvertes.data[0].number, body: corps,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: titre, body: corps, labels: ["surveillance"],
              });
            }

      - name: Refermer l'alerte si tout est rentré dans l'ordre
        if: steps.controle.outputs.resultat == 'ok'
        uses: actions/github-script@v7
        with:
          script: |
            const ouvertes = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "surveillance",
            });
            for (const issue of ouvertes.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number,
                body: "Le radar a repris : le site affiche à nouveau une date fraîche.",
              });
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, state: "closed",
              });
            }
