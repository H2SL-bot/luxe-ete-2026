name: Passe quotidienne (plancher garanti)

# LE PLANCHER. À ne pas confondre avec la routine Claude.
#
# La routine Claude fait le travail intelligent : chercher de nouveaux
# événements, traduire, composer les séjours. Mais elle peut s'arrêter — quota,
# panne, réglage manquant — et alors le site se fige en silence.
#
# Ce workflow garantit qu'il se passe QUELQUE CHOSE tous les jours, quoi qu'il
# arrive : il purge le périmé, teste les liens des événements imminents et
# rafraîchit la date affichée. Sans machine, sans clé d'API, sans compte Claude.
#
# Il passe APRÈS la routine (07:03 Paris) pour ne pas lui couper l'herbe sous le
# pied : si elle a déjà travaillé, il ne reste presque rien à faire et le
# workflow s'arrête sans rien publier.

on:
  schedule:
    - cron: "40 6 * * *" # ~08h40 Paris l'été — bien après la routine de 07:03
  workflow_dispatch: {} # + lancement manuel depuis l'onglet Actions

concurrency:
  group: publier-sur-main # partagé avec le report des branches claude/*
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  passe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Exécuter la passe d'entretien
        run: |
          set -o pipefail
          export RADAR_REPO="$GITHUB_WORKSPACE"
          python3 .radar/tools/passe_automatique.py --apply --max-liens 120 | tee /tmp/passe.log

      - name: Contrôler avant de publier
        run: |
          export RADAR_REPO="$GITHUB_WORKSPACE"
          python3 .radar/tools/validate.py

      - name: Publier si quelque chose a changé
        id: publication
        run: |
          export RADAR_REPO="$GITHUB_WORKSPACE"
          git config user.name  "radar-passe-quotidienne"
          git config user.email "radar-passe@users.noreply.github.com"
          if git diff --quiet && git diff --cached --quiet; then
            echo "Rien à publier : le site était déjà à jour."
            echo "publie=non" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add -A
          git commit -m "Passe quotidienne automatique — entretien et vérification des liens"
          git push origin HEAD:main
          echo "publie=oui" >> "$GITHUB_OUTPUT"

      - name: Signaler un échec
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const titre = "Passe quotidienne automatique en échec";
            const corps = [
              "Le plancher de mise à jour n'a pas abouti aujourd'hui.",
              "",
              "**Rien n'a été publié** — le site reste tel quel, il n'a pas été abîmé.",
              "",
              `Journal : ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            ].join("\n");
            const ouvertes = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "surveillance"
            });
            const dejaLa = ouvertes.data.find(i => i.title === titre);
            if (dejaLa) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: dejaLa.number, body: corps
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: titre, body: corps, labels: ["surveillance"]
              });
            }
